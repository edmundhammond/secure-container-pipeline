name: Secure Application & Container Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  application-security:
    name: App & Container Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      
      - name: Install Bandit Security Scanner
        run: pip install bandit

      - name: Run Bandit Source Code Scan
        run: bandit -r app.py

      
      - name: Build Docker Image Locally
        run: docker build -t secure-web-app:latest .

      
      - name: Run Trivy Container Security Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-web-app:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'